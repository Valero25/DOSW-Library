spring.application.name=DOSW-Library
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/library_db
spring.datasource.username=library_user
spring.datasource.password=library_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=dosw-library-secret-key-2026-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=3600000
